name: Update Profile Metrics

on:
  schedule:
    - cron: "23 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: profile-metrics
  cancel-in-progress: true

jobs:
  metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Overview stats and languages
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: Karmanya03
          filename: github-metrics.svg
          output_action: commit
          committer_branch: main
          committer_message: "chore: update profile metrics"
          config_timezone: Asia/Kolkata
          base: header, activity, community, repositories, metadata
          plugin_languages: yes
          plugin_languages_limit: 8
          plugin_languages_ignored: >-
            html, css, tex, less, dockerfile, makefile, qmake, lex, cmake, shell, gnuplot

      - name: Trophy achievements
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: Karmanya03
          filename: metrics.plugin.achievements.compact.svg
          output_action: commit
          committer_branch: main
          committer_message: "chore: update profile metrics"
          base: ""
          plugin_achievements: yes
          plugin_achievements_display: compact
          plugin_achievements_threshold: C
          plugin_achievements_only: >-
            polyglot, stargazer, deployer, member, maintainer, developer, scripter, explorer, infographile, manager

      - name: Isometric contribution calendar
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: Karmanya03
          filename: metrics.plugin.isocalendar.fullyear.svg
          output_action: commit
          committer_branch: main
          committer_message: "chore: update profile metrics"
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

      - name: Pinned repositories
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: Karmanya03
          filename: metrics.plugin.repositories.pinned.svg
          output_action: commit
          committer_branch: main
          committer_message: "chore: update profile metrics"
          base: ""
          plugin_repositories: yes
          plugin_repositories_pinned: 5

      - name: Recent activity
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: Karmanya03
          filename: metrics.plugin.activity.svg
          output_action: commit
          committer_branch: main
          committer_message: "chore: update profile metrics"
          base: ""
          plugin_activity: yes
          plugin_activity_limit: 6
          plugin_activity_days: 30
          plugin_activity_filter: issue, pr, release, fork, review, ref/create
