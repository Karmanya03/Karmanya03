name: Render Profile Panels

on:
  schedule:
    - cron: "17 2 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - README.md
      - scripts/generate_profile_panels.py
      - .github/workflows/update-profile-metrics.yml

permissions:
  contents: write

concurrency:
  group: profile-panels
  cancel-in-progress: true

jobs:
  render-panels:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate custom SVG panels
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PROFILE_USERNAME: Karmanya03
          PROFILE_OUT_DIR: assets/panels
        run: |
          python scripts/generate_profile_panels.py

      - name: Commit rendered panels
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "No panel changes detected"
            exit 0
          fi
          git add assets/panels/*.svg assets/panels/profile-metadata.json
          git commit -m "chore: refresh profile command-center panels"
          git push
