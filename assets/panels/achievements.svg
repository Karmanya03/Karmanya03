<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="490" viewBox="0 0 1200 490" role="img" aria-label="ACHIEVEMENTS">
    <defs>
        <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#040406"/>
            <stop offset="48%" stop-color="#0f090b"/>
            <stop offset="100%" stop-color="#050507"/>
        </linearGradient>
        <radialGradient id="vignette" cx="50%" cy="45%" r="70%">
            <stop offset="0%" stop-color="#000000" stop-opacity="0"/>
            <stop offset="100%" stop-color="#000000" stop-opacity="0.66"/>
        </radialGradient>
        <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%" stop-color="#a80000"/>
            <stop offset="52%" stop-color="#f4c35a"/>
            <stop offset="100%" stop-color="#ffffff"/>
        </linearGradient>
        <linearGradient id="shine" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
            <stop offset="45%" stop-color="#f4c35a" stop-opacity="0"/>
            <stop offset="50%" stop-color="#f4c35a" stop-opacity="0.88"/>
            <stop offset="55%" stop-color="#f4c35a" stop-opacity="0"/>
            <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
        </linearGradient>
        <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%" stop-color="#8c6a1a"/>
            <stop offset="100%" stop-color="#f4c35a"/>
        </linearGradient>
        <pattern id="scan" width="8" height="8" patternUnits="userSpaceOnUse">
            <rect width="8" height="8" fill="transparent"/>
            <path d="M0 0 L8 0" stroke="#ffffff" stroke-opacity="0.04"/>
        </pattern>
        <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="2.2" result="blur"/>
            <feMerge>
                <feMergeNode in="blur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
        <style>
            .title { fill: #ffffff; font: 700 42px 'Segoe UI', 'Trebuchet MS', sans-serif; letter-spacing: 1px; }
            .subtitle { fill: #f6d489; font: 500 20px 'Segoe UI', 'Trebuchet MS', sans-serif; }
            .label { fill: #e8e8e8; font: 600 18px 'Segoe UI', 'Trebuchet MS', sans-serif; }
            .value { fill: #ffffff; font: 700 36px 'Segoe UI', 'Trebuchet MS', sans-serif; }
            .small { fill: #f7f7f7; font: 500 16px 'Segoe UI', 'Trebuchet MS', sans-serif; }
            .muted { fill: #d6d6d6; font: 500 14px 'Segoe UI', 'Trebuchet MS', sans-serif; }
            .stamp { fill: #ffffff; font: 600 13px 'Segoe UI', 'Trebuchet MS', sans-serif; opacity: 0.8; }
            .mono { fill: #ffffff; font: 600 15px 'Consolas', 'Segoe UI Mono', monospace; }
        </style>
    </defs>

    <rect width="1200" height="490" fill="url(#bg)"/>
    <rect width="1200" height="490" fill="url(#vignette)"/>
    <rect x="24" y="24" width="1152" height="442" rx="24" fill="#0d0d0f" stroke="#f4c35a" stroke-opacity="0.55" stroke-width="2"/>
    <rect x="24" y="24" width="1152" height="442" rx="24" fill="url(#scan)" opacity="0.35"/>
    <rect x="24" y="24" width="1152" height="7" fill="url(#accent)" rx="24"/>
    <rect x="24" y="24" width="180" height="7" fill="url(#shine)" rx="24" filter="url(#softGlow)">
        <animate attributeName="x" values="24;996;24" dur="8s" repeatCount="indefinite"/>
    </rect>
    <rect x="24" y="34" width="1152" height="1.5" fill="url(#accent)" opacity="0.32">
        <animate attributeName="y" values="36;454;36" dur="9s" repeatCount="indefinite"/>
    </rect>
    <g opacity="0.36">
        <path d="M52 52 L122 52" stroke="#f4c35a" stroke-width="2" stroke-linecap="round">
            <animate attributeName="stroke-opacity" values="0.2;0.9;0.2" dur="3.2s" repeatCount="indefinite"/>
        </path>
        <path d="M52 52 L52 122" stroke="#f4c35a" stroke-width="2" stroke-linecap="round">
            <animate attributeName="stroke-opacity" values="0.8;0.2;0.8" dur="3.2s" repeatCount="indefinite"/>
        </path>
        <path d="M1148 52 L1078 52" stroke="#f4c35a" stroke-width="2" stroke-linecap="round">
            <animate attributeName="stroke-opacity" values="0.2;0.9;0.2" dur="3.2s" begin="0.6s" repeatCount="indefinite"/>
        </path>
        <path d="M1148 52 L1148 122" stroke="#f4c35a" stroke-width="2" stroke-linecap="round">
            <animate attributeName="stroke-opacity" values="0.8;0.2;0.8" dur="3.2s" begin="0.6s" repeatCount="indefinite"/>
        </path>
    </g>
    <g opacity="0.55">
        <circle cx="1088" cy="92" r="7" fill="#b30000" filter="url(#softGlow)">
            <animate attributeName="r" values="6;9;6" dur="2.4s" repeatCount="indefinite"/>
        </circle>
        <circle cx="1088" cy="92" r="17" fill="none" stroke="#f4c35a" stroke-width="1.2">
            <animate attributeName="r" values="14;22;14" dur="4.8s" repeatCount="indefinite"/>
            <animate attributeName="stroke-opacity" values="0.25;0.7;0.25" dur="4.8s" repeatCount="indefinite"/>
        </circle>
    </g>

    <text x="64" y="92" class="title">ACHIEVEMENTS</text>
    <text x="64" y="126" class="subtitle">Milestones forged from live GitHub telemetry</text>
    <text x="1136" y="126" class="stamp" text-anchor="end">Updated 21 Apr 2026 12:36 UTC</text>

    
  <text x="64" y="168" class="label">Unlocked 2/6</text>
  <rect x="64" y="194" width="334" height="112" rx="14" fill="#141417" stroke="#f4c35a" stroke-width="1.6"/>
  <rect x="64" y="194" width="334" height="6" rx="14" fill="#b30000"/>
  <text x="80" y="228" class="label">Repo Architect</text>
  <text x="80" y="256" class="small">36 repositories built</text>
  <text x="80" y="284" class="mono">UNLOCKED</text>

  <rect x="420" y="194" width="334" height="112" rx="14" fill="#141417" stroke="#595959" stroke-width="1.6"/>
  <rect x="420" y="194" width="334" height="6" rx="14" fill="#2b2b2e"/>
  <text x="436" y="228" class="label">Star Vanguard</text>
  <text x="436" y="256" class="small">6 stars collected</text>
  <text x="436" y="284" class="mono">LOCKED</text>

  <rect x="776" y="194" width="334" height="112" rx="14" fill="#141417" stroke="#595959" stroke-width="1.6"/>
  <rect x="776" y="194" width="334" height="6" rx="14" fill="#2b2b2e"/>
  <text x="792" y="228" class="label">Fork Commander</text>
  <text x="792" y="256" class="small">0 forks across projects</text>
  <text x="792" y="284" class="mono">LOCKED</text>

  <rect x="64" y="326" width="334" height="112" rx="14" fill="#141417" stroke="#595959" stroke-width="1.6"/>
  <rect x="64" y="326" width="334" height="6" rx="14" fill="#2b2b2e"/>
  <text x="80" y="360" class="label">Polyglot Operator</text>
  <text x="80" y="388" class="small">5 primary languages</text>
  <text x="80" y="416" class="mono">LOCKED</text>

  <rect x="420" y="326" width="334" height="112" rx="14" fill="#141417" stroke="#595959" stroke-width="1.6"/>
  <rect x="420" y="326" width="334" height="6" rx="14" fill="#2b2b2e"/>
  <text x="436" y="360" class="label">Signal Reach</text>
  <text x="436" y="388" class="small">13 followers</text>
  <text x="436" y="416" class="mono">LOCKED</text>

  <rect x="776" y="326" width="334" height="112" rx="14" fill="#141417" stroke="#f4c35a" stroke-width="1.6"/>
  <rect x="776" y="326" width="334" height="6" rx="14" fill="#b30000"/>
  <text x="792" y="360" class="label">Release Tempo</text>
  <text x="792" y="388" class="small">9 active repos in 90d</text>
  <text x="792" y="416" class="mono">UNLOCKED</text>

</svg>
