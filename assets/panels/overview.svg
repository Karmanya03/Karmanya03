<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="440" viewBox="0 0 1200 440" role="img" aria-label="COMMAND CENTER">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#060710"/>
      <stop offset="55%"  stop-color="#100b06"/>
      <stop offset="100%" stop-color="#06070e"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#131520"/>
      <stop offset="100%" stop-color="#0c0d18"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#8b0000"/>
      <stop offset="50%"  stop-color="#f1bd52"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#845e16"/>
      <stop offset="100%" stop-color="#f1bd52"/>
    </linearGradient>
    <pattern id="dots" width="18" height="18" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="0.7" fill="#fff" opacity="0.04"/>
    </pattern>
    <filter id="softGlow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowHard" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .title   { fill:#ffffff; font:800 26px 'Bahnschrift','Segoe UI',sans-serif; letter-spacing:4px; }
      .tsub    { fill:#e8b840; font:600 10.5px 'Segoe UI',sans-serif; letter-spacing:3px; }
      .label   { fill:#d0d8e8; font:600 14px 'Segoe UI','Trebuchet MS',sans-serif; }
      .value   { fill:#ffffff; font:800 32px 'Bahnschrift','Segoe UI',sans-serif; }
      .small   { fill:#c8d0e0; font:600 13px 'Segoe UI','Trebuchet MS',sans-serif; }
      .muted   { fill:#8890a8; font:500 11px 'Segoe UI','Trebuchet MS',sans-serif; }
      .stamp   { fill:#555; font:500 10px 'Segoe UI','Trebuchet MS',sans-serif; }
      .mono    { fill:#d8e0f0; font:700 12px 'Consolas','Segoe UI Mono',monospace; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="440" fill="url(#bg)"/>
  <!-- Main panel -->
  <rect x="14" y="14" width="1172" height="412" rx="20" fill="url(#panel)" stroke="#b87e28" stroke-width="1.5" stroke-opacity="0.65"/>
  <rect x="14" y="14" width="1172" height="412" rx="20" fill="url(#dots)"/>
  <!-- Top accent bar (gradient, full width) -->
  <rect x="14" y="14" width="1172" height="5" rx="20" fill="url(#accent)"/>

  <!-- ── Animated header section (72px tall) ── -->
  <!-- Subtle header bg strip -->
  <rect x="14" y="14" width="1172" height="72" rx="20" fill="#ffffff" fill-opacity="0.025"/>
  <rect x="14" y="80" width="1172" height="1" fill="url(#accent)" opacity="0.3"/>

  <!-- Corner HUD brackets -->
  <g stroke="#e8b840" stroke-width="1.5" fill="none" opacity="0.55">
    <path d="M30 30 L30 48 L48 48"/>
    <path d="M1170 30 L1170 48 L1152 48"/>
    <path d="M30 424 L30 406 L48 406"/>
    <path d="M1170 424 L1170 406 L1152 406"/>
  </g>

  <!-- Animated scanner line across header -->
  <rect x="56" y="50" width="1000" height="1" fill="url(#accent)" opacity="0.18"/>
  <rect x="0" y="50" width="180" height="1" fill="url(#accent)" opacity="0.9" filter="url(#softGlow)">
    <animateTransform attributeName="transform" type="translate" from="-180,0" to="1200,0" dur="3.8s" repeatCount="indefinite"/>
  </rect>

  <!-- Pulsing live indicator -->
  <circle cx="1152" cy="44" r="5" fill="#9f0000" filter="url(#glowHard)">
    <animate attributeName="r" values="4;8;4" dur="2.2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0.3;1" dur="2.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1152" cy="44" r="14" fill="none" stroke="#f1bd52" stroke-width="1" opacity="0.2">
    <animate attributeName="r" values="10;20;10" dur="3.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0;0.3" dur="3.5s" repeatCount="indefinite"/>
  </circle>
  <!-- LIVE label -->
  <text x="1136" y="42" fill="#e8b840" font-size="8" font-family="Segoe UI" font-weight="700" letter-spacing="2" text-anchor="end" opacity="0.7">LIVE</text>

  <!-- Section title and subtitle -->
  <text x="56" y="52" class="title">COMMAND CENTER</text>
  <text x="56" y="70" class="tsub">LIVE PROFILE TELEMETRY · PROJECT MOMENTUM</text>
  <text x="1140" y="70" class="stamp" text-anchor="end">Updated 02 May 2026 15:30 UTC</text>

  
  <rect x="46" y="104" width="310" height="66" rx="12" fill="#0e1020" stroke="#2a3050" stroke-width="1.1"/>
  <rect x="46" y="104" width="310" height="4" rx="12" fill="url(#gold)"/>
  <text x="64" y="128" class="label">Repositories</text>
  <text x="64" y="154" class="muted">13 active · 90d</text>
  <text x="340" y="148" class="value" text-anchor="end" style="font-size:28px">39</text>

  <rect x="46" y="182" width="310" height="66" rx="12" fill="#0e1020" stroke="#2a3050" stroke-width="1.1"/>
  <rect x="46" y="182" width="310" height="4" rx="12" fill="url(#gold)"/>
  <text x="64" y="206" class="label">Followers</text>
  <text x="64" y="232" class="muted">Following 15</text>
  <text x="340" y="226" class="value" text-anchor="end" style="font-size:28px">14</text>

  <rect x="46" y="260" width="310" height="66" rx="12" fill="#0e1020" stroke="#2a3050" stroke-width="1.1"/>
  <rect x="46" y="260" width="310" height="4" rx="12" fill="url(#gold)"/>
  <text x="64" y="284" class="label">Total Stars</text>
  <text x="64" y="310" class="muted">Open-source impact</text>
  <text x="340" y="304" class="value" text-anchor="end" style="font-size:28px">9</text>

  <rect x="46" y="338" width="310" height="66" rx="12" fill="#0e1020" stroke="#2a3050" stroke-width="1.1"/>
  <rect x="46" y="338" width="310" height="4" rx="12" fill="url(#gold)"/>
  <text x="64" y="362" class="label">Commits</text>
  <text x="64" y="388" class="muted">Public pushes</text>
  <text x="340" y="382" class="value" text-anchor="end" style="font-size:28px">497</text>

  <text x="420" y="110" class="label" style="letter-spacing:2px;fill:#e8b840;">LANGUAGE SIGNAL MATRIX</text>
  <text x="420" y="124" class="muted">Primary tech stack · Repo distribution</text>
  <text x="420" y="144" class="small">Rust</text>
  <rect x="420" y="150" width="680" height="14" rx="7" fill="#1a1d2e"/>
  <rect x="420" y="150" width="680" height="14" rx="7" fill="url(#accent)">
    <animate attributeName="opacity" values="0.8;1;0.8" dur="2.5s" repeatCount="indefinite"/>
  </rect>
  <text x="1108" y="162" class="mono">4790418</text>

  <text x="420" y="188" class="small">JavaScript</text>
  <rect x="420" y="194" width="680" height="14" rx="7" fill="#1a1d2e"/>
  <rect x="420" y="194" width="38" height="14" rx="7" fill="#3060e8">
    <animate attributeName="opacity" values="0.8;1;0.8" dur="2.8s" repeatCount="indefinite"/>
  </rect>
  <text x="1108" y="206" class="mono">270020</text>

  <text x="420" y="232" class="small">CSS</text>
  <rect x="420" y="238" width="680" height="14" rx="7" fill="#1a1d2e"/>
  <rect x="420" y="238" width="35" height="14" rx="7" fill="#a030e8">
    <animate attributeName="opacity" values="0.8;1;0.8" dur="3.1s" repeatCount="indefinite"/>
  </rect>
  <text x="1108" y="250" class="mono">247529</text>

  <text x="420" y="276" class="small">HTML</text>
  <rect x="420" y="282" width="680" height="14" rx="7" fill="#1a1d2e"/>
  <rect x="420" y="282" width="33" height="14" rx="7" fill="#e8b840">
    <animate attributeName="opacity" values="0.8;1;0.8" dur="3.4s" repeatCount="indefinite"/>
  </rect>
  <text x="1108" y="294" class="mono">236798</text>

  <text x="420" y="320" class="small">Python</text>
  <rect x="420" y="326" width="680" height="14" rx="7" fill="#1a1d2e"/>
  <rect x="420" y="326" width="31" height="14" rx="7" fill="#30a060">
    <animate attributeName="opacity" values="0.8;1;0.8" dur="3.7s" repeatCount="indefinite"/>
  </rect>
  <text x="1108" y="338" class="mono">223397</text>

  <text x="420" y="364" class="small">Shell</text>
  <rect x="420" y="370" width="680" height="14" rx="7" fill="#1a1d2e"/>
  <rect x="420" y="370" width="6" height="14" rx="7" fill="#e86060">
    <animate attributeName="opacity" values="0.8;1;0.8" dur="4.0s" repeatCount="indefinite"/>
  </rect>
  <text x="1108" y="382" class="mono">47099</text>

</svg>