<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-label="ARSENAL RADAR">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#050505"/>
      <stop offset="50%" stop-color="#110909"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
        <radialGradient id="vignette" cx="50%" cy="45%" r="70%">
            <stop offset="0%" stop-color="#000000" stop-opacity="0"/>
            <stop offset="100%" stop-color="#000000" stop-opacity="0.62"/>
        </radialGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#b30000"/>
      <stop offset="50%" stop-color="#f4c35a"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
        <linearGradient id="shine" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
            <stop offset="45%" stop-color="#f4c35a" stop-opacity="0"/>
            <stop offset="50%" stop-color="#f4c35a" stop-opacity="0.85"/>
            <stop offset="55%" stop-color="#f4c35a" stop-opacity="0"/>
            <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
        </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8c6a1a"/>
      <stop offset="100%" stop-color="#f4c35a"/>
    </linearGradient>
        <pattern id="scan" width="8" height="8" patternUnits="userSpaceOnUse">
            <rect width="8" height="8" fill="transparent"/>
            <path d="M0 0 L8 0" stroke="#ffffff" stroke-opacity="0.04"/>
        </pattern>
        <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="2.2" result="blur"/>
            <feMerge>
                <feMergeNode in="blur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    <style>
      .title { fill: #ffffff; font: 700 42px 'Segoe UI', 'Trebuchet MS', sans-serif; letter-spacing: 1px; }
      .subtitle { fill: #f6d489; font: 500 20px 'Segoe UI', 'Trebuchet MS', sans-serif; }
      .label { fill: #e8e8e8; font: 600 18px 'Segoe UI', 'Trebuchet MS', sans-serif; }
      .value { fill: #ffffff; font: 700 36px 'Segoe UI', 'Trebuchet MS', sans-serif; }
      .small { fill: #f7f7f7; font: 500 16px 'Segoe UI', 'Trebuchet MS', sans-serif; }
      .muted { fill: #d6d6d6; font: 500 14px 'Segoe UI', 'Trebuchet MS', sans-serif; }
      .stamp { fill: #ffffff; font: 600 13px 'Segoe UI', 'Trebuchet MS', sans-serif; opacity: 0.8; }
      .mono { fill: #ffffff; font: 600 15px 'Consolas', 'Segoe UI Mono', monospace; }
    </style>
  </defs>

  <rect width="1200" height="520" fill="url(#bg)"/>
    <rect width="1200" height="520" fill="url(#vignette)"/>
  <rect x="24" y="24" width="1152" height="472" rx="24" fill="#0d0d0f" stroke="#f4c35a" stroke-opacity="0.55" stroke-width="2"/>
    <rect x="24" y="24" width="1152" height="472" rx="24" fill="url(#scan)" opacity="0.35"/>
  <rect x="24" y="24" width="1152" height="7" fill="url(#accent)" rx="24"/>
    <rect x="24" y="24" width="180" height="7" fill="url(#shine)" rx="24" filter="url(#softGlow)">
        <animate attributeName="x" values="24;996;24" dur="8s" repeatCount="indefinite"/>
    </rect>
    <rect x="24" y="34" width="1152" height="1.5" fill="url(#accent)" opacity="0.32">
        <animate attributeName="y" values="36;484;36" dur="9s" repeatCount="indefinite"/>
    </rect>

  <text x="64" y="92" class="title">ARSENAL RADAR</text>
  <text x="64" y="126" class="subtitle">Unique profile signature and capability bands</text>
  <text x="1136" y="126" class="stamp" text-anchor="end">Updated 21 Apr 2026 12:18 UTC</text>

  
  <text x="64" y="170" class="label">Operational score bands</text>
  <text x="64" y="202" class="small">Build Velocity</text>
  <rect x="320" y="188" width="760" height="16" rx="8" fill="#1f1f24"/>
  <rect x="320" y="188" width="720" height="16" rx="8" fill="url(#accent)"/>
  <text x="1094" y="202" class="mono" text-anchor="end">100/100</text>

  <text x="64" y="256" class="small">Community Reach</text>
  <rect x="320" y="242" width="760" height="16" rx="8" fill="#1f1f24"/>
  <rect x="320" y="242" width="187" height="16" rx="8" fill="url(#accent)"/>
  <text x="1094" y="256" class="mono" text-anchor="end"> 26/100</text>

  <text x="64" y="310" class="small">Open Source Impact</text>
  <rect x="320" y="296" width="760" height="16" rx="8" fill="#1f1f24"/>
  <rect x="320" y="296" width="64" height="16" rx="8" fill="url(#accent)"/>
  <text x="1094" y="310" class="mono" text-anchor="end">  9/100</text>

  <text x="64" y="364" class="small">Polyglot Index</text>
  <rect x="320" y="350" width="760" height="16" rx="8" fill="#1f1f24"/>
  <rect x="320" y="350" width="503" height="16" rx="8" fill="url(#accent)"/>
  <text x="1094" y="364" class="mono" text-anchor="end"> 70/100</text>

  <text x="64" y="418" class="small">Collaboration Pulse</text>
  <rect x="320" y="404" width="760" height="16" rx="8" fill="#1f1f24"/>
  <rect x="320" y="404" width="453" height="16" rx="8" fill="url(#accent)"/>
  <text x="1094" y="418" class="mono" text-anchor="end"> 63/100</text>

  <text x="64" y="488" class="muted">A custom cyber-style profile signature panel replacing snake animation.</text>
</svg>
