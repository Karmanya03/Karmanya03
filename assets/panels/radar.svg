<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="430" viewBox="0 0 1200 430" role="img" aria-label="ARSENAL RADAR">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#060710"/>
      <stop offset="55%"  stop-color="#100b06"/>
      <stop offset="100%" stop-color="#06070e"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#131520"/>
      <stop offset="100%" stop-color="#0c0d18"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#8b0000"/>
      <stop offset="50%"  stop-color="#f1bd52"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#845e16"/>
      <stop offset="100%" stop-color="#f1bd52"/>
    </linearGradient>
    <pattern id="dots" width="18" height="18" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="0.7" fill="#fff" opacity="0.04"/>
    </pattern>
    <filter id="softGlow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowHard" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .title   { fill:#ffffff; font:800 26px 'Bahnschrift','Segoe UI',sans-serif; letter-spacing:4px; }
      .tsub    { fill:#e8b840; font:600 10.5px 'Segoe UI',sans-serif; letter-spacing:3px; }
      .label   { fill:#d0d8e8; font:600 14px 'Segoe UI','Trebuchet MS',sans-serif; }
      .value   { fill:#ffffff; font:800 32px 'Bahnschrift','Segoe UI',sans-serif; }
      .small   { fill:#c8d0e0; font:600 13px 'Segoe UI','Trebuchet MS',sans-serif; }
      .muted   { fill:#8890a8; font:500 11px 'Segoe UI','Trebuchet MS',sans-serif; }
      .stamp   { fill:#555; font:500 10px 'Segoe UI','Trebuchet MS',sans-serif; }
      .mono    { fill:#d8e0f0; font:700 12px 'Consolas','Segoe UI Mono',monospace; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="430" fill="url(#bg)"/>
  <!-- Main panel -->
  <rect x="14" y="14" width="1172" height="402" rx="20" fill="url(#panel)" stroke="#b87e28" stroke-width="1.5" stroke-opacity="0.65"/>
  <rect x="14" y="14" width="1172" height="402" rx="20" fill="url(#dots)"/>
  <!-- Top accent bar (gradient, full width) -->
  <rect x="14" y="14" width="1172" height="5" rx="20" fill="url(#accent)"/>

  <!-- ── Animated header section (72px tall) ── -->
  <!-- Subtle header bg strip -->
  <rect x="14" y="14" width="1172" height="72" rx="20" fill="#ffffff" fill-opacity="0.025"/>
  <rect x="14" y="80" width="1172" height="1" fill="url(#accent)" opacity="0.3"/>

  <!-- Corner HUD brackets -->
  <g stroke="#e8b840" stroke-width="1.5" fill="none" opacity="0.55">
    <path d="M30 30 L30 48 L48 48"/>
    <path d="M1170 30 L1170 48 L1152 48"/>
    <path d="M30 414 L30 396 L48 396"/>
    <path d="M1170 414 L1170 396 L1152 396"/>
  </g>

  <!-- Animated scanner line across header -->
  <rect x="56" y="50" width="1000" height="1" fill="url(#accent)" opacity="0.18"/>
  <rect x="0" y="50" width="180" height="1" fill="url(#accent)" opacity="0.9" filter="url(#softGlow)">
    <animateTransform attributeName="transform" type="translate" from="-180,0" to="1200,0" dur="3.8s" repeatCount="indefinite"/>
  </rect>

  <!-- Pulsing live indicator -->
  <circle cx="1152" cy="44" r="5" fill="#9f0000" filter="url(#glowHard)">
    <animate attributeName="r" values="4;8;4" dur="2.2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0.3;1" dur="2.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1152" cy="44" r="14" fill="none" stroke="#f1bd52" stroke-width="1" opacity="0.2">
    <animate attributeName="r" values="10;20;10" dur="3.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0;0.3" dur="3.5s" repeatCount="indefinite"/>
  </circle>
  <!-- LIVE label -->
  <text x="1136" y="42" fill="#e8b840" font-size="8" font-family="Segoe UI" font-weight="700" letter-spacing="2" text-anchor="end" opacity="0.7">LIVE</text>

  <!-- Section title and subtitle -->
  <text x="56" y="52" class="title">ARSENAL RADAR</text>
  <text x="56" y="70" class="tsub">CAPABILITY BANDS · OPERATIONAL PROFILE SCORE</text>
  <text x="1140" y="70" class="stamp" text-anchor="end">Updated 29 Apr 2026 22:41 UTC</text>

  
  <text x="46" y="108" class="label" style="fill:#e8b840;letter-spacing:2px;">OPERATIONAL CAPABILITY BANDS</text>
  <defs>
    <linearGradient id="rbar0" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c43030"/>
      <stop offset="100%" stop-color="#f5d060"/>
    </linearGradient>
  </defs>
  <!-- Score circle -->
  <circle cx="62" cy="140" r="20" fill="#0e1020" stroke="#c43030" stroke-width="1.5"/>
  <text x="62" y="146" text-anchor="middle" style="fill:#f5d060;font:800 13px 'Bahnschrift',sans-serif;">100</text>
  <!-- Label -->
  <text x="88" y="138" class="small" style="font-size:12px">Build Velocity</text>
  <text x="88" y="152" class="muted">score 100/100</text>
  <!-- Bar track (fixed width, never overflows) -->
  <rect x="280" y="132" width="670" height="18" rx="9" fill="#1a1d2e"/>
  <!-- Bar fill (clamped to BAR_TRACK) -->
  <rect x="280" y="132" width="670" height="18" rx="9" fill="url(#rbar0)">
    <animate attributeName="opacity" values="0.8;1;0.8" dur="2.4s" repeatCount="indefinite"/>
  </rect>
  <!-- Score text -->
  <text x="960" y="146" class="mono" style="fill:#f5d060;font-size:13px;font-weight:800;">100 / 100</text>

  <defs>
    <linearGradient id="rbar1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3060e8"/>
      <stop offset="100%" stop-color="#60d0f0"/>
    </linearGradient>
  </defs>
  <!-- Score circle -->
  <circle cx="62" cy="194" r="20" fill="#0e1020" stroke="#3060e8" stroke-width="1.5"/>
  <text x="62" y="200" text-anchor="middle" style="fill:#60d0f0;font:800 13px 'Bahnschrift',sans-serif;">28</text>
  <!-- Label -->
  <text x="88" y="192" class="small" style="font-size:12px">Community Reach</text>
  <text x="88" y="206" class="muted">score 28/100</text>
  <!-- Bar track (fixed width, never overflows) -->
  <rect x="280" y="186" width="670" height="18" rx="9" fill="#1a1d2e"/>
  <!-- Bar fill (clamped to BAR_TRACK) -->
  <rect x="280" y="186" width="187" height="18" rx="9" fill="url(#rbar1)">
    <animate attributeName="opacity" values="0.8;1;0.8" dur="2.7s" repeatCount="indefinite"/>
  </rect>
  <!-- Score text -->
  <text x="960" y="200" class="mono" style="fill:#60d0f0;font-size:13px;font-weight:800;"> 28 / 100</text>

  <defs>
    <linearGradient id="rbar2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8030e8"/>
      <stop offset="100%" stop-color="#c060f0"/>
    </linearGradient>
  </defs>
  <!-- Score circle -->
  <circle cx="62" cy="248" r="20" fill="#0e1020" stroke="#8030e8" stroke-width="1.5"/>
  <text x="62" y="254" text-anchor="middle" style="fill:#c060f0;font:800 13px 'Bahnschrift',sans-serif;">9</text>
  <!-- Label -->
  <text x="88" y="246" class="small" style="font-size:12px">Open Source Impact</text>
  <text x="88" y="260" class="muted">score 9/100</text>
  <!-- Bar track (fixed width, never overflows) -->
  <rect x="280" y="240" width="670" height="18" rx="9" fill="#1a1d2e"/>
  <!-- Bar fill (clamped to BAR_TRACK) -->
  <rect x="280" y="240" width="60" height="18" rx="9" fill="url(#rbar2)">
    <animate attributeName="opacity" values="0.8;1;0.8" dur="3.0s" repeatCount="indefinite"/>
  </rect>
  <!-- Score text -->
  <text x="960" y="254" class="mono" style="fill:#c060f0;font-size:13px;font-weight:800;">  9 / 100</text>

  <defs>
    <linearGradient id="rbar3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#30a060"/>
      <stop offset="100%" stop-color="#60f0c0"/>
    </linearGradient>
  </defs>
  <!-- Score circle -->
  <circle cx="62" cy="302" r="20" fill="#0e1020" stroke="#30a060" stroke-width="1.5"/>
  <text x="62" y="308" text-anchor="middle" style="fill:#60f0c0;font:800 13px 'Bahnschrift',sans-serif;">100</text>
  <!-- Label -->
  <text x="88" y="300" class="small" style="font-size:12px">Polyglot Index</text>
  <text x="88" y="314" class="muted">score 100/100</text>
  <!-- Bar track (fixed width, never overflows) -->
  <rect x="280" y="294" width="670" height="18" rx="9" fill="#1a1d2e"/>
  <!-- Bar fill (clamped to BAR_TRACK) -->
  <rect x="280" y="294" width="670" height="18" rx="9" fill="url(#rbar3)">
    <animate attributeName="opacity" values="0.8;1;0.8" dur="3.3s" repeatCount="indefinite"/>
  </rect>
  <!-- Score text -->
  <text x="960" y="308" class="mono" style="fill:#60f0c0;font-size:13px;font-weight:800;">100 / 100</text>

  <defs>
    <linearGradient id="rbar4" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e87030"/>
      <stop offset="100%" stop-color="#f0c060"/>
    </linearGradient>
  </defs>
  <!-- Score circle -->
  <circle cx="62" cy="356" r="20" fill="#0e1020" stroke="#e87030" stroke-width="1.5"/>
  <text x="62" y="362" text-anchor="middle" style="fill:#f0c060;font:800 13px 'Bahnschrift',sans-serif;">97</text>
  <!-- Label -->
  <text x="88" y="354" class="small" style="font-size:12px">Collaboration Pulse</text>
  <text x="88" y="368" class="muted">score 97/100</text>
  <!-- Bar track (fixed width, never overflows) -->
  <rect x="280" y="348" width="670" height="18" rx="9" fill="#1a1d2e"/>
  <!-- Bar fill (clamped to BAR_TRACK) -->
  <rect x="280" y="348" width="649" height="18" rx="9" fill="url(#rbar4)">
    <animate attributeName="opacity" values="0.8;1;0.8" dur="3.6s" repeatCount="indefinite"/>
  </rect>
  <!-- Score text -->
  <text x="960" y="362" class="mono" style="fill:#f0c060;font-size:13px;font-weight:800;"> 97 / 100</text>

</svg>