        <path d="M1148 52 L1078 52" stroke="#f4c35a" stroke-width="2" stroke-linecap="round">
            <animate attributeName="stroke-opacity" values="0.2;0.9;0.2" dur="3.2s" begin="0.6s" repeatCount="indefinite"/>
